<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>けものめ — Kemonome</title>
<style>
/* --- 1. 全体のトーン＆ベーススタイル --- */
:root {
--bg-color: #F9F6F0; /* 優しい生成り色 */
--text-main: #4A3E3D; /* チョコレートブラウン（文字を柔らかく） */
--color-human: #ECE6D6; /* ヒト */
--color-dog: #CBA135; /* イヌ */
--color-cat: #6FB89A; /* ネコ */
}

body {
margin: 0;
padding: 0;
background-color: var(--bg-color);
color: var(--text-main);
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
display: flex;
flex-direction: column;
align-items: center;
min-height: 100vh;
overflow-x: hidden;
-webkit-user-select: none;
}

/* --- 2. ヘッダー周り --- */
header {
margin: 20px 0 10px 0;
text-align: center;
}

header h1 {
font-size: 1.5rem;
margin: 0;
font-weight: 800;
letter-spacing: 0.05em;
color: #E07A5F; /* サーモンピンクのアクセント */
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
}

header p {
font-size: 0.75rem;
margin: 4px 0 0 0;
color: #A08E8A;
font-weight: 500;
}

/* --- 3. カメラ/Canvasのコンテナ（ポラロイド写真風） --- */
.viewport-container {
position: relative;
width: 88vw;
max-width: 380px;
aspect-ratio: 1 / 1; /* 正方形にフィット */
background: #FFFFFF;
padding: 12px;
border-radius: 32px; /* コロンとした丸み */
box-shadow: 0 12px 32px rgba(74, 62, 61, 0.08);
box-sizing: border-box;
transition: transform 0.3s ease;
}

/* 内部のCanvas表示 */
#vision-canvas {
width: 100%;
height: 100%;
border-radius: 22px; /* 内側も丸く */
background-color: #222;
object-fit: cover;
display: block;
}

/* --- 4. タブ型の可愛い切り替えコントローラー --- */
.mode-selector {
display: flex;
background: rgba(255, 255, 255, 0.8);
backdrop-filter: blur(8px);
padding: 6px;
border-radius: 40px;
margin-top: 24px;
box-shadow: 0 6px 20px rgba(74, 62, 61, 0.05);
width: 85vw;
max-width: 360px;
justify-content: space-between;
box-sizing: border-box;
}

.mode-btn {
flex: 1;
border: none;
background: transparent;
padding: 12px 8px;
font-size: 0.9rem;
font-weight: 700;
color: #A08E8A;
cursor: pointer;
border-radius: 32px;
transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
}

/* アクティブ時の各動物専用カラー */
.mode-btn[data-species="human"].active {
background-color: var(--color-human);
color: #555;
}
.mode-btn[data-species="dog"].active {
background-color: var(--color-dog);
color: #FFFFFF;
text-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.mode-btn[data-species="cat"].active {
background-color: var(--color-cat);
color: #FFFFFF;
text-shadow: 0 1px 2px rgba(0,0,0,0.15);
}

/* ぷにっとしたタップ感 */
.mode-btn:active {
transform: scale(0.95);
}

/* --- 5. お散歩お役立ち：ステータス解説パネル --- */
.info-card {
margin-top: 20px;
width: 85vw;
max-width: 360px;
background: #FFFFFF;
border-radius: 24px;
padding: 16px;
box-shadow: 0 8px 24px rgba(74, 62, 61, 0.04);
box-sizing: border-box;
transition: all 0.3s ease;
border-left: 6px solid var(--color-human);
}

.info-card.dog-theme { border-left-color: var(--color-dog); }
.info-card.cat-theme { border-left-color: var(--color-cat); }

.info-row {
display: flex;
font-size: 0.8rem;
margin-bottom: 6px;
line-height: 1.4;
}
.info-row:last-child { margin-bottom: 0; }
.info-label {
font-weight: 700;
width: 70px;
color: #A08E8A;
flex-shrink: 0;
}
.info-value {
color: var(--text-main);
font-weight: 500;
}
</style>
</head>
<body>

<header>
<h1>🐾 けものめ</h1>
<p>お散歩がもっと楽しくなる、動物の視界カメラ</p>
</header>

<div class="viewport-container">
<canvas id="vision-canvas"></canvas>
</div>

<div class="mode-selector">
<button class="mode-btn active" data-species="human">
<span>🚶‍♂️</span><span>ヒト</span>
</button>
<button class="mode-btn" data-species="dog">
<span>🐾</span><span>イヌ</span>
</button>
<button class="mode-btn" data-species="cat">
<span>🐱</span><span>ネコ</span>
</button>
</div>

<div class="info-card" id="info-card">
<div class="info-row">
<div class="info-label">色の見え方</div>
<div class="info-value" id="info-color">三色型 — フルカラーを知覚</div>
</div>
<div class="info-row">
<div class="info-label">視野角</div>
<div class="info-value" id="info-fov">約180°</div>
</div>
<div class="info-row">
<div class="info-label">特徴</div>
<div class="info-value" id="info-note">解像度・色彩認識ともに最も高い</div>
</div>
</div>

<script>
// ボタン切り替え時に `SPECIES` のデータ(data.color や data.fov)を
// 上記の `#info-color` やカードの枠線色（テーマクラス）に連動させる処理を
// JavaScript / React 側で紐付けてあげると、選んだ動物のデータが可愛く表示されます！
</script>
</body>
</html>
